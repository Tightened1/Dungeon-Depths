# Keeps the free Supabase project from pausing (it pauses after 7 idle days).
# Pings the leaderboard twice a week. Create this file in your repo at EXACTLY:
#   .github/workflows/keep-alive.yml
# (GitHub web: Add file -> Create new file -> type the full path as the name.)
# Then replace the two YOUR_... placeholders below with the same values you
# pasted into leaderboard.js.

name: Keep leaderboard alive
on:
  schedule:
    - cron: '17 9 * * 1,4'   # every Monday and Thursday 09:17 UTC
  workflow_dispatch:          # also lets you run it manually from the Actions tab

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase
        run: |
          curl -sf "https://cakaairkyzomzskszvec.supabase.co/rest/v1/scores?select=id&limit=1" \
            -H "apikey: sb_publishable_i7ueCWk57_HfDFTY0N5lww_a0vORYZc" \
            -H "Authorization: Bearer sb_publishable_i7ueCWk57_HfDFTY0N5lww_a0vORYZc" \
            -o /dev/null
          echo "leaderboard pinged"
